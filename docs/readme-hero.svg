  <text x="158" y="29" fill="#9e9c93" font-family="Cascadia Code, monospace" font-size="12" letter-spacing="1.6">1.8.5</text>
  </g>
  <text x="66" y="150" fill="#d66d49" font-family="Cascadia Code, monospace" font-size="13" font-weight="700" letter-spacing="2.5">PLAN BEFORE THE AGENT BUILDS</text>
  <text x="66" y="215" fill="#f0ecdf" font-family="Segoe UI Variable, Arial, sans-serif" font-size="51" font-weight="680" letter-spacing="-2.7">One request becomes a current,</text>
  <text x="66" y="273" fill="#9e9c93" font-family="Segoe UI Variable, Arial, sans-serif" font-size="51" font-weight="520" letter-spacing="-2.7">domain-aware execution contract.</text>
  <g transform="translate(66 326)">
