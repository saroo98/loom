<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Loom — evidence before execution</title>
  <desc id="desc">A woven planning path turns one request into an evidence-backed execution plan.</desc>
  <defs>
    <pattern id="grid" width="68" height="68" patternUnits="userSpaceOnUse">
      <path d="M68 0H0V68" fill="none" stroke="#eee9dc" stroke-opacity=".07"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#111210"/>
      <stop offset="1" stop-color="#1b1d19"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" rx="18" fill="url(#fade)"/>
  <rect width="1200" height="420" rx="18" fill="url(#grid)"/>
  <g transform="translate(70 58)">
    <g fill="none" stroke-linecap="square" stroke-width="3">
      <path d="M7 0v38M20 0v38M33 0v38M46 0v38" stroke="#eee9dc"/>
      <path d="M0 9h53M0 20h53M0 31h53" stroke="#d86b45"/>
    </g>
    <text x="70" y="31" fill="#eee9dc" font-family="Segoe UI Variable, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="-1">Loom</text>
    <text x="158" y="29" fill="#9f9d94" font-family="Cascadia Code, monospace" font-size="12" letter-spacing="2">1.0</text>
  </g>
  <text x="70" y="170" fill="#d86b45" font-family="Cascadia Code, monospace" font-size="13" font-weight="700" letter-spacing="2.5">PLANNING INTELLIGENCE FOR AI CODING AGENTS</text>
  <text x="70" y="230" fill="#eee9dc" font-family="Segoe UI Variable, Arial, sans-serif" font-size="52" font-weight="680" letter-spacing="-2.8">One request. A plan that has earned</text>
  <text x="70" y="289" fill="#9f9d94" font-family="Segoe UI Variable, Arial, sans-serif" font-size="52" font-weight="520" letter-spacing="-2.8">the right to execute.</text>
  <g transform="translate(70 338)">
    <rect width="270" height="46" fill="#d86b45"/>
    <text x="18" y="29" fill="#111210" font-family="Cascadia Code, monospace" font-size="14" font-weight="700">/loom &lt;request&gt;</text>
  </g>
  <g transform="translate(740 88)" fill="none">
    <path d="M0 30C90 30 70 88 170 88S286 30 390 30" stroke="#eee9dc" stroke-opacity=".58" stroke-width="2" stroke-dasharray="10 7"/>
    <path d="M0 100c96 0 82 56 186 56s114-56 204-56" stroke="#d86b45" stroke-width="2" stroke-dasharray="10 7"/>
    <path d="M0 170c90 0 70 58 180 58s118-58 210-58" stroke="#eee9dc" stroke-opacity=".58" stroke-width="2" stroke-dasharray="10 7"/>
    <path d="M64 0v270M160 0v270M256 0v270M352 0v270" stroke="#eee9dc" stroke-opacity=".12"/>
    <g fill="#111210" stroke="#d86b45">
      <rect x="28" y="14" width="72" height="30"/><rect x="126" y="140" width="76" height="30"/><rect x="222" y="74" width="82" height="30"/><rect x="320" y="154" width="70" height="30"/>
    </g>
    <g fill="#eee9dc" font-family="Cascadia Code, monospace" font-size="9" letter-spacing="1">
      <text x="40" y="34">WORLD</text><text x="136" y="160">DOMAIN</text><text x="238" y="94">PLAN</text><text x="330" y="174">PROOF</text>
    </g>
  </g>
</svg>
