      <g transform="translate(112 155)"><rect width="82" height="30" fill="#121311" stroke="#d66d49"/><text x="14" y="20" fill="#f0ecdf">DOMAIN</text></g>
      <g transform="translate(218 77)"><rect width="72" height="30" fill="#121311" stroke="#d66d49"/><text x="18" y="20" fill="#f0ecdf">PLAN</text></g>
      <g transform="translate(314 232)"><rect width="72" height="30" fill="#121311" stroke="#d66d49"/><text x="15" y="20" fill="#f0ecdf">PROOF</text></g>
