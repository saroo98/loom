<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Loom — plan before the agent builds</title>
  <desc id="desc">One request becomes a current, domain-aware, evidence-backed execution contract.</desc>
  <defs>
    <pattern id="grid" width="68" height="68" patternUnits="userSpaceOnUse">
      <path d="M68 0H0V68" fill="none" stroke="#f0ecdf" stroke-opacity=".07"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#121311"/>
      <stop offset="1" stop-color="#1d1f1b"/>
    </linearGradient>
    <linearGradient id="thread" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#d66d49" stop-opacity="0"/>
      <stop offset=".45" stop-color="#d66d49"/>
      <stop offset="1" stop-color="#d66d49" stop-opacity=".1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" rx="18" fill="url(#fade)"/>
  <rect width="1200" height="420" rx="18" fill="url(#grid)"/>
  <g transform="translate(66 52)">
