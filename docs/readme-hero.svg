    <path d="M0 124c102 0 88 48 190 48s112-48 196-48" fill="none" stroke="#d66d49" stroke-width="2" stroke-dasharray="10 7"/>
    <path d="M0 204c96 0 78 48 184 48s118-48 202-48" fill="none" stroke="#f0ecdf" stroke-opacity=".55" stroke-width="2" stroke-dasharray="10 7"/>
    <path d="M48 0v284M146 0v284M244 0v284M342 0v284" fill="none" stroke="#f0ecdf" stroke-opacity=".12"/>
