name: verify-and-attest-draft-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing immutable-version draft release tag
        required: true
        type: string
      confirm_draft_only:
        description: Type DRAFT-ONLY. This workflow never publishes.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: loom-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    if: inputs.confirm_draft_only == 'DRAFT-ONLY'
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    environment: loom-release
    permissions:
      actions: read
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Require clean exact signed tag on default branch
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          LOOM_RELEASE_SIGNING_PUBLIC_KEY: ${{ vars.LOOM_RELEASE_SIGNING_PUBLIC_KEY }}
        shell: bash
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$LOOM_RELEASE_SIGNING_PUBLIC_KEY" =~ ^ssh-ed25519\ [A-Za-z0-9+/]+={0,3}$ ]]
          test "$RELEASE_TAG" = "v$(cat VERSION)"
          test "$(git rev-parse "${RELEASE_TAG}^{commit}")" = "${GITHUB_SHA}"
          printf 'xizirsaro@gmail.com %s\n' "$LOOM_RELEASE_SIGNING_PUBLIC_KEY" \
            > "$RUNNER_TEMP/loom-release-allowed-signers"
          git config gpg.format ssh
          git config gpg.ssh.allowedSignersFile "$RUNNER_TEMP/loom-release-allowed-signers"
          git verify-tag "$RELEASE_TAG"
          git branch -r --contains "${GITHUB_SHA}" | grep -q 'origin/main'
      - name: Rebuild and verify the public cut twice
        shell: bash
        run: |
          python -B tools/loom_release.py build . "$RUNNER_TEMP/cut-a" --source-classification public-release
          python -B tools/loom_release.py build . "$RUNNER_TEMP/cut-b" --source-classification public-release
          diff -qr "$RUNNER_TEMP/cut-a" "$RUNNER_TEMP/cut-b"
          python -B tools/loom_release.py verify-cut "$RUNNER_TEMP/cut-a" --output "$RUNNER_TEMP/cut-receipt.json"
          python -B tools/loom_clean_room.py "$RUNNER_TEMP/cut-a" --output "$RUNNER_TEMP/clean-room.json"
      - name: Bind exact main capability evidence
        env:
          GH_TOKEN: ${{ github.token }}
          LOOM_SOURCE_SHA: ${{ github.sha }}
        shell: bash
        run: |
          python -B - <<'PY' > "$RUNNER_TEMP/main-runs.env"
          import json
          import os
          import subprocess

          sha = os.environ["LOOM_SOURCE_SHA"]

          def exact_success(workflow):
              completed = subprocess.run(
                  ["gh", "run", "list", "--workflow", workflow, "--commit", sha,
                   "--event", "push", "--limit", "20", "--json",
                   "databaseId,headBranch,headSha,status,conclusion"],
                  check=True, capture_output=True, text=True,
              )
              rows = json.loads(completed.stdout)
              matches = [row for row in rows if row["headBranch"] == "main"
                         and row["headSha"] == sha and row["status"] == "completed"
                         and row["conclusion"] == "success"]
              if not matches:
                  raise SystemExit(f"no successful exact-main {workflow} run")
              return max(int(row["databaseId"]) for row in matches)

          print(f"QUALITY_RUN={exact_success('quality.yml')}")
          print(f"COMPATIBILITY_RUN={exact_success('compatibility.yml')}")
          PY
          source "$RUNNER_TEMP/main-runs.env"
          test -n "$QUALITY_RUN" -a -n "$COMPATIBILITY_RUN"
          gh run download "$QUALITY_RUN" --pattern 'full-test-timings-*' \
            --dir "$RUNNER_TEMP/capability-reports"
          test "$(find "$RUNNER_TEMP/capability-reports" -name full-test-timings.json -type f | wc -l)" -eq 15
      - name: Run exact source suite and rollback battery
        working-directory: tools
        env:
          LOOM_CUT_RECEIPT: ${{ runner.temp }}/cut-receipt.json
          LOOM_MATRIX_ROOT: ${{ runner.temp }}/capability-reports
          LOOM_SOURCE_SHA: ${{ github.sha }}
        run: |
          PUBLIC_ROOT="$(python -B -c 'import json,os; print(json.load(open(os.environ["LOOM_CUT_RECEIPT"], encoding="utf-8"))["root_sha256"])')"
          mapfile -t REPORTS < <(find "$LOOM_MATRIX_ROOT" -name full-test-timings.json -type f | sort)
          ARGS=()
          for report in "${REPORTS[@]}"; do ARGS+=(--matrix-report "$report"); done
          python -B loom_release_suite.py "${ARGS[@]}" --commit "$LOOM_SOURCE_SHA" \
            --public-root "$PUBLIC_ROOT" --output "$RUNNER_TEMP/full-suite.json"
          python -B -m unittest -v test_loom_update_v11.py test_loom_crash_recovery.py test_release_asset.py
          python -B loom_current_facts.py ../contracts/current-facts-v1.json
      - name: Download existing draft assets without publishing
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: gh release download "$RELEASE_TAG" --dir release-assets
      - name: Verify canonical archive and checksums
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          cd release-assets
          sha256sum --check SHA256SUMS
          cd ../tools
          python -B loom_release_verify.py "../release-assets/loom-plugin-${RELEASE_TAG}.zip"
          python -B loom_release_subject_verify.py "../release-assets/RELEASE-SUBJECT.json" \
            --plugin "../release-assets/loom-plugin-${RELEASE_TAG}.zip" \
            --commit "${GITHUB_SHA}" --tag "$RELEASE_TAG"
      - name: Verify generated operational truth is current
        working-directory: tools
        run: python -B loom_readiness.py .. --check
      - uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-checksums: release-assets/SHA256SUMS
      - name: Prove the release is still a draft
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: test "$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)" = "true"
