name: native-compatibility

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-compatibility-${{ github.ref }}
  cancel-in-progress: false

jobs:
  native-helpers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {runner: ubuntu-24.04, platform: linux-x64}
          - {runner: ubuntu-24.04-arm, platform: linux-arm64}
          - {runner: windows-2025, platform: windows-x64}
          - {runner: windows-11-arm, platform: windows-arm64}
          - {runner: macos-15-intel, platform: macos-x64}
          - {runner: macos-15, platform: macos-arm64}
    uses: ./.github/workflows/build-helper.yml
    with:
      runner: ${{ matrix.runner }}
      platform: ${{ matrix.platform }}

  python-contract:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
      - name: Build exact public cut
        working-directory: tools
        run: python -B loom_release.py build .. "${{ runner.temp }}/loom-public-cut" --source-classification public-release
      - name: Verify exact public cut
        working-directory: tools
        run: python -B loom_release.py verify-cut "${{ runner.temp }}/loom-public-cut"
