name: quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  fast-pr-gate:
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python }}
      - name: Compile production modules without bytecode
        working-directory: tools
        run: >-
          python -B -c "from pathlib import Path;
          files=sorted(Path('.').glob('loom_*.py'));
          [compile(path.read_text(encoding='utf-8'), str(path), 'exec') for path in files];
          print(f'compiled {len(files)} production modules in memory')"
      - name: Run bounded trust-critical gate
        working-directory: tools
        run: python -B loom_test.py fast --max-seconds 30 --output fast-test-timings.json
      - name: Regenerate final inventory and require committed parity
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.10'
        working-directory: tools
        run: python -B loom_docs.py generate --root .. && git diff --exit-code -- ../docs/generated-evidence.json
      - name: Validate the fixed evidence score rubric
        working-directory: tools
        run: python -B loom_scorecard.py validate-rubric
      - name: Refuse stale generated readiness and host documentation
        working-directory: tools
        run: python -B loom_readiness.py .. --check
      - name: Enforce one version across every shipped surface
        working-directory: tools
        run: python -B loom_version.py ..
      - name: Run deterministic local performance micro-corpus
        working-directory: tools
        run: python -B loom_benchmark.py --iterations 3 --warmups 1 --output performance-micro.json
      - name: Run simulated adapter protocol conformance
        working-directory: tools
        run: python -B loom_adapter_conformance.py --root .. --output adapter-conformance.json
      - name: Verify successful fast-gate artifacts
        if: success()
        working-directory: tools
        shell: bash
        run: test -f fast-test-timings.json -a -f adapter-conformance.json -a -f performance-micro.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: fast-test-timings-${{ matrix.os }}-py${{ matrix.python }}
          path: tools/fast-test-timings.json
          retention-days: 7
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: adapter-conformance-${{ matrix.os }}-py${{ matrix.python }}
          path: tools/adapter-conformance.json
          retention-days: 7
          if-no-files-found: ignore
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: performance-micro-${{ matrix.os }}-py${{ matrix.python }}
          path: tools/performance-micro.json
          retention-days: 7
          if-no-files-found: ignore

  full-release-suite:
    if: github.event_name == 'push'
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python }}
      - name: Compile production modules without bytecode
        working-directory: tools
        run: >-
          python -B -c "from pathlib import Path;
          files=sorted(Path('.').glob('loom_*.py'));
          [compile(path.read_text(encoding='utf-8'), str(path), 'exec') for path in files];
          print(f'compiled {len(files)} production modules in memory')"
      - name: Audit network imports and literal subprocesses
        working-directory: tools
        run: python loom_privacy.py offline-audit .
      - name: Build and verify the exact public cut
        working-directory: tools
        run: >-
          python -B loom_exact_cut_ci.py .. "${{ runner.temp }}/loom-public-cut"
          --forbidden-token "loom-ci-${{ github.run_id }}-${{ matrix.os }}-py${{ matrix.python }}"
          --output exact-cut-ci.json --suite-output full-test-timings.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: full-test-timings-${{ matrix.os }}-py${{ matrix.python }}
          path: |
            tools/exact-cut-ci.json
            tools/full-test-timings.json
          retention-days: 7
          if-no-files-found: error

  aggregate-capability-coverage:
    if: github.event_name == 'push'
    needs: full-release-suite
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: full-test-timings-*
          path: capability-reports
          merge-multiple: false
      - name: Require every skipped capability to pass in another bound job
        working-directory: tools
        shell: bash
        run: python -B loom_capability.py ../capability-reports/*/full-test-timings.json

  loom-11-vault-and-upgrade:
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
      - name: Use the repository-pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Verify Rust formatting and deny Clippy warnings
        run: cargo fmt --manifest-path vault-helper/Cargo.toml -- --check
      - name: Compile and lint the cryptographic helper
        run: cargo clippy --locked --manifest-path vault-helper/Cargo.toml --all-targets -- -D warnings
      - name: Exercise Loom 1.1 vault, migration, update, transfer, and plugin contracts
        working-directory: tools
        run: >-
          python -B -m unittest
          test_loom_v11_contracts.py
          test_loom_vault_v11.py
          test_loom_crypto_v11.py
          test_loom_migration_v11.py
          test_loom_merge_v11.py
          test_loom_update_v11.py
          test_loom_transfer_v11.py
          test_loom_plugin_adapters_v11.py
          test_adapter_protocol_v2.py
          test_adapter_conformance_v2.py
          test_scorecard_phase6.py
          test_loom_owner_v11.py
          test_loom_release_sign_v11.py
          test_owner_learning_phase2.py
