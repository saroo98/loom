name: build-native-helper

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      platform:
        required: true
        type: string

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  build-helper:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Record native runner identity
        env:
          LOOM_RUNNER_LABEL: ${{ inputs.runner }}
        shell: bash
        run: |
          mkdir -p native-evidence
          python -B tools/loom_platform_probe.py \
            --runner "$LOOM_RUNNER_LABEL" \
            --workflow-digest "$(sha256sum .github/workflows/build-helper.yml | cut -d' ' -f1)" \
            --output native-evidence/runner.json
      - name: Build locked native helper twice
        env:
          LOOM_BUILD_TARGET: ${{ runner.temp }}/loom-repro-build
        shell: bash
        run: |
          export RUST_MIN_STACK=67108864
          if [ "$RUNNER_OS" = "Windows" ]; then
            export RUSTFLAGS="${RUSTFLAGS:+$RUSTFLAGS }-C link-arg=/Brepro"
          fi
          CARGO_TARGET_DIR="$LOOM_BUILD_TARGET" cargo build --locked --release --manifest-path vault-helper/Cargo.toml
          cp "$LOOM_BUILD_TARGET/release/loom-vault${{ runner.os == 'Windows' && '.exe' || '' }}" \
             "$RUNNER_TEMP/loom-vault-first${{ runner.os == 'Windows' && '.exe' || '' }}"
          python -B -c "import os,shutil; from pathlib import Path; target=Path(os.environ['LOOM_BUILD_TARGET']).resolve(); temporary=Path(os.environ['RUNNER_TEMP']).resolve(); target.relative_to(temporary); assert target.name == 'loom-repro-build'; shutil.rmtree(target)"
          CARGO_TARGET_DIR="$LOOM_BUILD_TARGET" cargo build --locked --release --manifest-path vault-helper/Cargo.toml
          cmp "$RUNNER_TEMP/loom-vault-first${{ runner.os == 'Windows' && '.exe' || '' }}" \
              "$LOOM_BUILD_TARGET/release/loom-vault${{ runner.os == 'Windows' && '.exe' || '' }}"
      - name: Test locked native helper
        run: cargo test --locked --manifest-path vault-helper/Cargo.toml
      - name: Generate both SBOM formats from final bytes
        env:
          LOOM_PLATFORM: ${{ inputs.platform }}
          LOOM_SOURCE_SHA: ${{ github.sha }}
          LOOM_BINARY_NAME: loom-vault${{ runner.os == 'Windows' && '.exe' || '' }}
        shell: bash
        run: |
          NAMESPACE_SEED="$(printf '%s' "$LOOM_SOURCE_SHA" | sha256sum | cut -d' ' -f1)"
          cp "$RUNNER_TEMP/loom-repro-build/release/$LOOM_BINARY_NAME" \
             "native-evidence/$LOOM_BINARY_NAME"
          cp "$RUNNER_TEMP/loom-vault-first${{ runner.os == 'Windows' && '.exe' || '' }}" \
             "native-evidence/$LOOM_BINARY_NAME.rebuild"
          python -B tools/loom_sbom.py . "native-evidence/$LOOM_BINARY_NAME" \
            "native-evidence/loom-vault.spdx.json" --platform "$LOOM_PLATFORM" \
            --namespace-seed "$NAMESPACE_SEED"
          python -B tools/loom_cyclonedx.py . "native-evidence/$LOOM_BINARY_NAME" \
            "native-evidence/loom-vault.cdx.json" --platform "$LOOM_PLATFORM" \
            --namespace-seed "$NAMESPACE_SEED"
      - name: Record exact binary and source evidence
        env:
          LOOM_PLATFORM: ${{ inputs.platform }}
          LOOM_SOURCE_SHA: ${{ github.sha }}
          LOOM_RUN_ID: ${{ github.run_id }}
          LOOM_BINARY_NAME: loom-vault${{ runner.os == 'Windows' && '.exe' || '' }}
        shell: bash
        run: |
          python -B - <<'PY'
          import hashlib
          import json
          import os
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path("tools").resolve()))
          import loom_plugin_package

          binary = Path("native-evidence") / os.environ["LOOM_BINARY_NAME"]
          rebuild = binary.with_name(binary.name + ".rebuild")
          sbom = Path("native-evidence/loom-vault.spdx.json")
          lock = Path("vault-helper/Cargo.lock")
          digest = lambda path: hashlib.sha256(path.read_bytes()).hexdigest()
          source_digest = loom_plugin_package._source_digest(Path(".").resolve())
          provenance = {
              "schema_version": 1,
              "repository": "https://github.com/saroo98/loom",
              "commit": os.environ["LOOM_SOURCE_SHA"],
              "platform": os.environ["LOOM_PLATFORM"],
              "binary_sha256": digest(rebuild),
              "source_sha256": source_digest,
              "cargo_lock_sha256": digest(lock),
              "independent_build": True,
              "builder": {
                  "id": "github-actions-native-helper",
                  "run_id": os.environ["LOOM_RUN_ID"],
              },
          }
          provenance_path = Path("native-evidence/provenance.json")
          provenance_path.write_text(
              json.dumps(provenance, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          receipt = {
              "platform": os.environ["LOOM_PLATFORM"],
              "binary_sha256": digest(binary),
              "rebuild_sha256": digest(rebuild),
              "source_sha256": source_digest,
              "cargo_lock_sha256": digest(lock),
              "sbom_sha256": digest(sbom),
              "provenance_sha256": digest(provenance_path),
          }
          Path("native-evidence/receipt.json").write_text(
              json.dumps(receipt, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          loom_plugin_package._verify_helper_platform(
              os.environ["LOOM_PLATFORM"], binary)
          loom_plugin_package._verify_helper_receipt(
              os.environ["LOOM_PLATFORM"], binary, receipt,
              {"rebuild": rebuild, "sbom": sbom, "provenance": provenance_path},
              Path(".").resolve(), os.environ["LOOM_SOURCE_SHA"],
          )
          PY
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-helper-${{ inputs.platform }}-${{ github.sha }}
          path: native-evidence/
          retention-days: 7
          if-no-files-found: error
